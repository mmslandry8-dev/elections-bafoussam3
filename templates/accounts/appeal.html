{% extends 'base.html' %}

{% block content %}
<h2 class="text-2xl mb-4">Connexion</h2>

<form method="post">
    {% csrf_token %}
    <input type="text" name="username" placeholder="Username" class="block mb-2 text-black">
    <input type="password" name="password" placeholder="Password" class="block mb-2 text-black">

    <button class="bg-yellow-400 text-black px-4 py-2 rounded">
        Se connecter
    </button>
</form>
{% endblock %}
